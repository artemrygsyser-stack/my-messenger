<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Облачный Мессенджер - Звонки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid #34495e;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .online-count {
            font-size: 12px;
            color: #2ecc71;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .user-name::before {
            content: "●";
            color: #2ecc71;
            font-size: 10px;
        }
        
        .call-btn {
            background: #27ae60;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .call-btn:hover {
            background: #2ecc71;
        }
        
        .call-btn.in-call {
            background: #e74c3c;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.system {
            align-items: center;
        }
        
        .message.system .message-bubble {
            background: #e9ecef;
            color: #6c757d;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message-username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #495057;
        }
        
        .message-text {
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: #6c757d;
            margin-top: 4px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        #send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        #send-btn:hover {
            background: #5a67d8;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Видео звонок */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .video-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            height: 80%;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .video-box {
            position: relative;
            flex: 1;
            min-width: 300px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .call-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        
        .call-controls button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .call-controls button:hover {
            transform: scale(1.05);
        }
        
        .end-call-btn {
            background: #e74c3c;
            color: white;
        }
        
        .toggle-mic-btn, .toggle-video-btn {
            background: #34495e;
            color: white;
        }
        
        .incoming-call {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 1500;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .incoming-call button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .accept-call {
            background: #27ae60;
            color: white;
        }
        
        .reject-call {
            background: #e74c3c;
            color: white;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .video-box {
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay" style="display: flex;">
        <div class="login-box">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="login-name" placeholder="Введите ваше имя" maxlength="20">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>
    
    <div class="chat-container" style="display: none;" id="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Онлайн</h3>
                <div class="online-count" id="online-count">0 человек</div>
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <h2>💬 Общий чат</h2>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="input-area">
                <textarea id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>
    
    <div id="call-overlay" class="call-overlay" style="display: none;">
        <div class="video-container" id="video-container">
            <div class="video-box">
                <video id="local-video" autoplay muted playsinline></video>
                <div class="video-label">Вы</div>
            </div>
            <div class="video-box">
                <video id="remote-video" autoplay playsinline></video>
                <div class="video-label" id="remote-label">Собеседник</div>
            </div>
        </div>
        <div class="call-controls">
            <button class="toggle-mic-btn" onclick="toggleMic()">🎤 Выкл микрофон</button>
            <button class="toggle-video-btn" onclick="toggleVideo()">📹 Выкл камеру</button>
            <button class="end-call-btn" onclick="hangUp()">🔴 Завершить</button>
        </div>
    </div>
    
    <div id="incoming-call" class="incoming-call" style="display: none;">
        <span>📞 Входящий звонок от <span id="caller-name"></span></span>
        <button class="accept-call" onclick="acceptCall()">Ответить</button>
        <button class="reject-call" onclick="rejectCall()">Отклонить</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let localStream = null;
        let peerConnection = null;
        let currentCallWith = null;
        let isCallActive = false;
        let pendingOffer = null;
        let pendingCallerId = null;
        
                const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                {
                    urls: 'turn:relay1.expressturn.com:3478',
                    username: 'efFQXYVHMQCKATYXKZ',
                    credential: 'sQ2WApLc6k47NsUy'
                },
                {
                    urls: 'turn:relay2.expressturn.com:3478',
                    username: 'efFQXYVHMQCKATYXKZ',
                    credential: 'sQ2WApLc6k47NsUy'
                }
            ]
        };
        
        // DOM элементы
        const loginOverlay = document.getElementById('login-overlay');
        const chatContainer = document.getElementById('chat-container');
        const messagesArea = document.getElementById('messages-area');
        const usersList = document.getElementById('users-list');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const onlineCountSpan = document.getElementById('online-count');
        const callOverlay = document.getElementById('call-overlay');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const incomingCallDiv = document.getElementById('incoming-call');
        const callerNameSpan = document.getElementById('caller-name');
        
        // Проверяем, есть ли сохранённое имя
        const savedName = localStorage.getItem('messenger_username');
        if (savedName) {
            document.getElementById('login-name').value = savedName;
        }
        
        function joinChat() {
            const name = document.getElementById('login-name').value.trim();
            if (!name) {
                alert('Пожалуйста, введите имя');
                return;
            }
            
            currentUser = name;
            // Сохраняем имя в localStorage
            localStorage.setItem('messenger_username', currentUser);
            
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            socket.emit('user join', currentUser);
        }
        
        function addMessage(data, isSystem = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            if (isSystem) {
                messageDiv.className = 'message system';
                messageDiv.innerHTML = `<div class="message-bubble">${data}</div>`;
            } else {
                const isCurrentUser = data.username === currentUser;
                messageDiv.innerHTML = `
                    <div class="message-bubble" style="${isCurrentUser ? 'background: #667eea; color: white; margin-left: auto;' : 'background: white;'}">
                        ${!isCurrentUser ? `<div class="message-username">${data.username}</div>` : ''}
                        <div class="message-text">${escapeHtml(data.message)}</div>
                        <div class="message-time">${data.time}</div>
                    </div>
                `;
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateUsersList(users) {
            usersList.innerHTML = '';
            onlineCountSpan.textContent = `${users.length} человек`;
            
            users.forEach(user => {
                if (user !== currentUser) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div class="user-name">${user}</div>
                        <button class="call-btn" onclick="startCall('${user}')">📞</button>
                    `;
                    usersList.appendChild(userDiv);
                } else {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `<div class="user-name">${user} (Вы)</div>`;
                    usersList.appendChild(userDiv);
                }
            });
        }
        
        // ========== ЗВОНКИ ==========
        
                async function startCall(targetUsername) {
            if (isCallActive) {
                alert('У вас уже активен звонок');
                return;
            }
            
            try {
                console.log('Запрашиваем доступ к медиа...');
                // Запрашиваем только аудио для начала (так проще)
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                console.log('Доступ к микрофону получен');
                
                // Показываем локальное видео (если нужно - добавим позже)
                if (localVideo) {
                    localVideo.srcObject = localStream;
                }
                
                createPeerConnection();
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                currentCallWith = targetUsername;
                isCallActive = true;
                
                console.log('Отправляем звонок пользователю:', targetUsername);
                socket.emit('call user', {
                    targetUsername: targetUsername,
                    callerUsername: currentUser,
                    offer: offer
                });
                
                callOverlay.style.display = 'flex';
                document.getElementById('remote-label').textContent = targetUsername;
                
            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                alert('Не удалось получить доступ к микрофону. Проверьте разрешения в браузере.');
            }
        }
        
                function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            console.log('PeerConnection создан');
            
            peerConnection.ontrack = (event) => {
                console.log('✅ Получен трек от собеседника!', event.streams[0]);
                remoteVideo.srcObject = event.streams[0];
                // Если используем только аудио, скроем видео-элементы
                document.querySelector('.video-box').style.display = 'none';
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('📡 Отправлен ICE кандидат');
                    socket.emit('ice candidate', {
                        toId: currentCallWith,
                        candidate: event.candidate
                    });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log('🔌 ICE состояние:', peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'connected') {
                    console.log('✅ Звонок установлен!');
                } else if (peerConnection.iceConnectionState === 'failed') {
                    console.log('❌ ICE соединение не установлено');
                    alert('Не удалось установить соединение. Проверьте интернет.');
                    hangUp();
                }
            };
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log('➕ Добавлен трек:', track.kind);
                });
            }
        }
        
        socket.on('incoming call', async (data) => {
            if (isCallActive) {
                socket.emit('reject call', { toId: data.fromId });
                return;
            }
            
            pendingCallerId = data.fromId;
            pendingOffer = data.offer;
            callerNameSpan.textContent = data.from;
            incomingCallDiv.style.display = 'flex';
        });
        
         async function acceptCall() {
            incomingCallDiv.style.display = 'none';
            
            try {
                console.log('Принимаем звонок, запрашиваем микрофон...');
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                console.log('Доступ к микрофону получен');
                
                if (localVideo) {
                    localVideo.srcObject = localStream;
                }
                
                createPeerConnection();
                
                await peerConnection.setRemoteDescription(pendingOffer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                currentCallWith = pendingCallerId;
                isCallActive = true;
                
                socket.emit('answer call', {
                    toId: pendingCallerId,
                    answer: answer
                });
                
                callOverlay.style.display = 'flex';
                document.getElementById('remote-label').textContent = 'Собеседник';
                
            } catch (err) {
                console.error('Ошибка ответа на звонок:', err);
                alert('Не удалось получить доступ к микрофону');
            }
        }
        
        function rejectCall() {
            socket.emit('reject call', { toId: pendingCallerId });
            incomingCallDiv.style.display = 'none';
            pendingCallerId = null;
            pendingOffer = null;
        }
        
        socket.on('call answered', async (data) => {
            await peerConnection.setRemoteDescription(data.answer);
        });
        
        socket.on('ice candidate', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(data.candidate);
            }
        });
        
        socket.on('call ended', () => {
            hangUp();
        });
        
        socket.on('call rejected', () => {
            alert('Звонок отклонён');
            hangUp();
        });
        
        function hangUp() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (isCallActive && currentCallWith) {
                socket.emit('end call', { toId: currentCallWith });
            }
            
            callOverlay.style.display = 'none';
            isCallActive = false;
            currentCallWith = null;
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
        }
        
        function toggleMic() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.querySelector('.toggle-mic-btn').textContent = audioTrack.enabled ? '🎤 Выкл микрофон' : '🎙️ Вкл микрофон';
                }
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.querySelector('.toggle-video-btn').textContent = videoTrack.enabled ? '📹 Выкл камеру' : '📹 Вкл камеру';
                }
            }
        }
        
        // ========== ЧАТ ==========
        
        socket.on('chat history', (messages) => {
            messagesArea.innerHTML = '';
            messages.forEach(msg => addMessage(msg));
        });
        
        socket.on('chat message', (data) => {
            if (data.username !== currentUser) {
                addMessage(data);
            }
        });
        
        socket.on('user joined', (data) => {
            addMessage(`${data.username} присоединился к чату`, true);
        });
        
        socket.on('user left', (data) => {
            addMessage(`${data.username} покинул чат`, true);
        });
        
        socket.on('users list', (users) => {
            updateUsersList(users);
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            socket.emit('chat message', {
                username: currentUser,
                message: message
            });
            
            addMessage({
                username: currentUser,
                message: message,
                time: new Date().toLocaleTimeString()
            });
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Если имя сохранено, можно сразу войти
        if (savedName) {
            setTimeout(() => {
                if (currentUser === null && savedName) {
                    document.getElementById('login-name').value = savedName;
                }
            }, 100);
        }
    </script>
</body>
</html>
