<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Голосовой чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid #34495e;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .online-count {
            font-size: 12px;
            color: #2ecc71;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .user-name::before {
            content: "●";
            color: #2ecc71;
            font-size: 10px;
        }
        
        .call-btn {
            background: #27ae60;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .call-btn:hover {
            background: #2ecc71;
        }
        
        .call-btn.in-call {
            background: #e74c3c;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .chat-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.system {
            align-items: center;
        }
        
        .message.system .message-bubble {
            background: #e9ecef;
            color: #6c757d;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message-username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #495057;
        }
        
        .message-text {
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: #6c757d;
            margin-top: 4px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        #send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Окно звонка */
        .call-window {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: #2c3e50;
            border-radius: 15px;
            padding: 15px;
            color: white;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
        }
        
        .call-window.active {
            display: block;
        }
        
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .call-status {
            font-size: 12px;
            color: #f39c12;
        }
        
        .call-status.talking {
            color: #2ecc71;
        }
        
        .talk-btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: all 0.1s;
        }
        
        .talk-btn:active {
            transform: scale(0.97);
            background: #c0392b;
        }
        
        .talk-btn.muted {
            background: #7f8c8d;
        }
        
        .end-call-btn {
            background: #95a5a6;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
        }
        
        .incoming-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 280px;
            background: #2c3e50;
            border-radius: 15px;
            padding: 15px;
            color: white;
            z-index: 2000;
            display: none;
        }
        
        .incoming-call.active {
            display: block;
        }
        
        .incoming-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .accept-btn {
            background: #27ae60;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
        }
        
        .reject-btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
        }
        
        .call-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #34495e;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            z-index: 2000;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="login-name" placeholder="Введите ваше имя" maxlength="20">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>
    
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Онлайн</h3>
                <div class="online-count" id="online-count">0 человек</div>
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <h2>💬 Общий чат</h2>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="input-area">
                <textarea id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>
    
    <!-- Окно звонка -->
    <div id="call-window" class="call-window">
        <div class="call-header">
            <span>📞 Разговор с <span id="call-with-name"></span></span>
            <span class="call-status" id="call-status">⏳ Соединение...</span>
        </div>
        <button class="talk-btn" id="talk-btn" onmousedown="startTalking()" onmouseup="stopTalking()" onmouseleave="stopTalking()" ontouchstart="startTalking()" ontouchend="stopTalking()">
            🎤 ГОВОРИТЬ (Удерживай)
        </button>
        <button class="end-call-btn" onclick="endCall()">🔴 Завершить звонок</button>
    </div>
    
    <!-- Входящий звонок -->
    <div id="incoming-call" class="incoming-call">
        <div>📞 <span id="caller-name"></span> звонит вам...</div>
        <div class="incoming-buttons">
            <button class="accept-btn" onclick="acceptCall()">Ответить</button>
            <button class="reject-btn" onclick="rejectCall()">Отклонить</button>
        </div>
    </div>
    
    <div id="call-notification" class="call-notification" style="display: none;"></div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let mediaStream = null;
        let mediaRecorder = null;
        let isInCall = false;
        let currentCallWith = null;
        let pendingCaller = null;
        let audioContext = null;
        let isTalking = false;
        
        // DOM элементы
        const loginOverlay = document.getElementById('login-overlay');
        const chatContainer = document.getElementById('chat-container');
        const messagesArea = document.getElementById('messages-area');
        const usersList = document.getElementById('users-list');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const onlineCountSpan = document.getElementById('online-count');
        const callWindow = document.getElementById('call-window');
        const incomingCallDiv = document.getElementById('incoming-call');
        const callerNameSpan = document.getElementById('caller-name');
        const callWithNameSpan = document.getElementById('call-with-name');
        const callStatusSpan = document.getElementById('call-status');
        const talkBtn = document.getElementById('talk-btn');
        const callNotification = document.getElementById('call-notification');
        
        // Сохранённое имя
        const savedName = localStorage.getItem('messenger_username');
        if (savedName) {
            document.getElementById('login-name').value = savedName;
        }
        
        function joinChat() {
            const name = document.getElementById('login-name').value.trim();
            if (!name) {
                alert('Введите имя');
                return;
            }
            
            currentUser = name;
            localStorage.setItem('messenger_username', currentUser);
            
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            socket.emit('user join', currentUser);
        }
        
        function addMessage(data, isSystem = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            if (isSystem) {
                messageDiv.className = 'message system';
                messageDiv.innerHTML = `<div class="message-bubble">${data}</div>`;
            } else {
                const isCurrentUser = data.username === currentUser;
                messageDiv.innerHTML = `
                    <div class="message-bubble" style="${isCurrentUser ? 'background: #667eea; color: white; margin-left: auto;' : 'background: white;'}">
                        ${!isCurrentUser ? `<div class="message-username">${data.username}</div>` : ''}
                        <div class="message-text">${escapeHtml(data.message)}</div>
                        <div class="message-time">${data.time}</div>
                    </div>
                `;
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateUsersList(users) {
            usersList.innerHTML = '';
            onlineCountSpan.textContent = `${users.length} человек`;
            
            users.forEach(user => {
                if (user !== currentUser) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div class="user-name">${user}</div>
                        <button class="call-btn" onclick="startCall('${user}')">📞 Позвонить</button>
                    `;
                    usersList.appendChild(userDiv);
                } else {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `<div class="user-name">${user} (Вы)</div>`;
                    usersList.appendChild(userDiv);
                }
            });
        }
        
        // ========== ЗВОНКИ ==========
        
        async function startCall(targetUsername) {
            if (isInCall) {
                showNotification('У вас уже активен звонок');
                return;
            }
            
            currentCallWith = targetUsername;
            callWithNameSpan.textContent = targetUsername;
            callStatusSpan.textContent = '⏳ Звоним...';
            callWindow.classList.add('active');
            
            socket.emit('start call', { targetUsername: targetUsername });
        }
        
        function acceptCall() {
            incomingCallDiv.classList.remove('active');
            startVoiceChat();
            socket.emit('accept call');
            callStatusSpan.textContent = '🎤 Нажми и удерживай "ГОВОРИТЬ"';
            callStatusSpan.classList.add('talking');
        }
        
        function rejectCall() {
            socket.emit('reject call');
            incomingCallDiv.classList.remove('active');
            pendingCaller = null;
        }
        
        function startVoiceChat() {
            isInCall = true;
            callWindow.classList.add('active');
            talkBtn.disabled = false;
            talkBtn.classList.remove('muted');
        }
        
        async function initMicrophone() {
            if (mediaStream) return;
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('Микрофон готов');
                
                // Настраиваем воспроизведение входящего звука
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(audioContext.destination);
                
            } catch (err) {
                console.error('Ошибка микрофона:', err);
                showNotification('Не удалось получить доступ к микрофону');
            }
        }
        
        function startTalking() {
            if (!isInCall) return;
            if (isTalking) return;
            
            isTalking = true;
            talkBtn.textContent = '🔴 ГОВОРЮ... (Отпусти)';
            talkBtn.style.background = '#e74c3c';
            
            // Начинаем запись и отправку голоса
            if (mediaStream) {
                if (mediaRecorder) {
                    mediaRecorder.stop();
                }
                
                const chunks = [];
                mediaRecorder = new MediaRecorder(mediaStream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        chunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    if (chunks.length > 0) {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            socket.emit('voice data', {
                                audio: reader.result
                            });
                        };
                    }
                    chunks.length = 0;
                };
                
                mediaRecorder.start(100); // Отправляем каждые 100ms
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 150);
            }
        }
        
        function stopTalking() {
            if (!isInCall) return;
            if (!isTalking) return;
            
            isTalking = false;
            talkBtn.textContent = '🎤 ГОВОРИТЬ (Удерживай)';
            talkBtn.style.background = '#e74c3c';
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }
        
        function endCall() {
            socket.emit('end call');
            cleanupCall();
        }
        
        function cleanupCall() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            mediaRecorder = null;
            
            callWindow.classList.remove('active');
            isInCall = false;
            currentCallWith = null;
            isTalking = false;
            talkBtn.textContent = '🎤 ГОВОРИТЬ (Удерживай)';
            talkBtn.style.background = '#e74c3c';
        }
        
        function showNotification(msg) {
            callNotification.textContent = msg;
            callNotification.style.display = 'block';
            setTimeout(() => {
                callNotification.style.display = 'none';
            }, 3000);
        }
        
        // ========== СОБЫТИЯ СОКЕТА ==========
        
        socket.on('call status', (data) => {
            if (data.status === 'offline') {
                showNotification(data.message);
                cleanupCall();
            } else if (data.status === 'busy') {
                showNotification(data.message);
                cleanupCall();
            } else if (data.status === 'waiting') {
                callStatusSpan.textContent = '📞 Звоним...';
            }
        });
        
        socket.on('incoming call', (data) => {
            if (isInCall) {
                socket.emit('reject call');
                return;
            }
            
            pendingCaller = data.from;
            callerNameSpan.textContent = data.from;
            incomingCallDiv.classList.add('active');
        });
        
        socket.on('call accepted', async () => {
            await initMicrophone();
            startVoiceChat();
            callStatusSpan.textContent = '🎤 Нажми и удерживай "ГОВОРИТЬ"';
            callStatusSpan.classList.add('talking');
        });
        
        socket.on('call rejected', () => {
            showNotification('Звонок отклонён');
            cleanupCall();
        });
        
        socket.on('call ended', () => {
            showNotification('Звонок завершён');
            cleanupCall();
        });
        
        socket.on('voice data', (data) => {
            // Воспроизводим полученный голос
            const audio = new Audio(data.audio);
            audio.play().catch(e => console.log('Audio play error:', e));
        });
        
        // ========== ЧАТ ==========
        
        socket.on('chat history', (messages) => {
            messagesArea.innerHTML = '';
            messages.forEach(msg => addMessage(msg));
        });
        
        socket.on('chat message', (data) => {
            if (data.username !== currentUser) {
                addMessage(data);
            }
        });
        
        socket.on('user joined', (data) => {
            addMessage(`${data.username} присоединился`, true);
        });
        
        socket.on('user left', (data) => {
            addMessage(`${data.username} покинул чат`, true);
        });
        
        socket.on('users list', (users) => {
            updateUsersList(users);
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            socket.emit('chat message', {
                username: currentUser,
                message: message
            });
            
            addMessage({
                username: currentUser,
                message: message,
                time: new Date().toLocaleTimeString()
            });
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Инициализация микрофона при входе
        initMicrophone();
    </script>
</body>
</html>
