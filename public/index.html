<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Голосовые, фото, ответы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid #34495e;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .online-count {
            font-size: 12px;
            color: #2ecc71;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-name::before {
            content: "●";
            color: #2ecc71;
            font-size: 10px;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .chat-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .message:hover {
            background: rgba(0,0,0,0.03);
        }
        
        .message.system {
            align-items: center;
            cursor: default;
        }
        
        .message.system:hover {
            background: transparent;
        }
        
        .message.system .message-bubble {
            background: #e9ecef;
            color: #6c757d;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        /* Ответ на сообщение */
        .reply-preview {
            background: rgba(0,0,0,0.05);
            padding: 5px 10px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 11px;
            border-left: 3px solid #667eea;
        }
        
        .reply-preview span {
            font-weight: bold;
            color: #667eea;
        }
        
        .reply-preview .reply-text {
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        
        .reply-indicator {
            position: absolute;
            top: -20px;
            left: 0;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            display: none;
        }
        
        .message-username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #495057;
        }
        
        .message-text {
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: #6c757d;
            margin-top: 4px;
        }
        
        /* Голосовое сообщение */
        .voice-message {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .voice-message:hover {
            background: #5a67d8;
        }
        
        /* Изображение */
        .message-image {
            max-width: 250px;
            max-height: 250px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .image-caption {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        /* Панель ответа */
        .reply-bar {
            background: #f0f0f0;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #667eea;
            margin: 0 20px;
            border-radius: 10px;
        }
        
        .reply-bar-content {
            flex: 1;
            font-size: 12px;
        }
        
        .reply-bar-content span {
            font-weight: bold;
            color: #667eea;
        }
        
        .cancel-reply {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            padding: 0 5px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message-input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .voice-btn {
            background: #e74c3c;
        }
        
        .voice-btn:hover {
            background: #c0392b;
        }
        
        .voice-btn.recording {
            background: #27ae60;
            animation: pulse 0.5s infinite;
        }
        
        .image-btn {
            background: #3498db;
        }
        
        .image-btn:hover {
            background: #2980b9;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .recording-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 14px;
            animation: pulse 0.5s infinite;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        
        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 4000;
            overflow: hidden;
        }
        
        .context-menu div {
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .context-menu div:hover {
            background: #f0f0f0;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            button {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="login-name" placeholder="Введите ваше имя" maxlength="20">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>
    
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Онлайн</h3>
                <div class="online-count" id="online-count">0 человек</div>
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <h2>💬 Общий чат</h2>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div id="reply-bar" class="reply-bar" style="display: none;">
                <div class="reply-bar-content">
                    <span>Ответ</span>
                    <div id="reply-preview-text"></div>
                </div>
                <button class="cancel-reply" onclick="cancelReply()">✕</button>
            </div>
            <div class="input-area">
                <div class="message-input-wrapper">
                    <textarea id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                    <button id="send-btn">Отправить</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="voice-btn" class="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" onmouseleave="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">🎤</button>
                    <button id="image-btn" class="image-btn" onclick="document.getElementById('image-input').click()">📷</button>
                    <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;" onchange="sendImage(this)">
                </div>
            </div>
        </div>
    </div>
    
    <div id="recording-hint" class="recording-hint" style="display: none;">
        🎙️ Запись... Отпустите кнопку для отправки
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let replyToMessage = null;
        let messagesMap = new Map(); // id -> message data
        
        // DOM элементы
        const loginOverlay = document.getElementById('login-overlay');
        const chatContainer = document.getElementById('chat-container');
        const messagesArea = document.getElementById('messages-area');
        const usersList = document.getElementById('users-list');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const onlineCountSpan = document.getElementById('online-count');
        const recordingHint = document.getElementById('recording-hint');
        const voiceBtn = document.getElementById('voice-btn');
        const replyBar = document.getElementById('reply-bar');
        const replyPreviewText = document.getElementById('reply-preview-text');
        
        // Сохранённое имя
        const savedName = localStorage.getItem('messenger_username');
        if (savedName) {
            document.getElementById('login-name').value = savedName;
        }
        
        function joinChat() {
            const name = document.getElementById('login-name').value.trim();
            if (!name) {
                alert('Введите имя');
                return;
            }
            
            currentUser = name;
            localStorage.setItem('messenger_username', currentUser);
            
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            socket.emit('user join', currentUser);
        }
        
        function formatReplyText(message) {
            if (message.type === 'text') {
                return message.message.length > 50 ? message.message.substring(0, 50) + '...' : message.message;
            } else if (message.type === 'voice') {
                return '🎤 Голосовое сообщение';
            } else if (message.type === 'image') {
                return '📷 Фото' + (message.caption ? `: ${message.caption}` : '');
            }
            return 'Сообщение';
        }
        
        function showReplyBar(message) {
            replyToMessage = message;
            const previewText = `${message.username}: ${formatReplyText(message)}`;
            replyPreviewText.innerHTML = previewText;
            replyBar.style.display = 'flex';
            messageInput.focus();
        }
        
        function cancelReply() {
            replyToMessage = null;
            replyBar.style.display = 'none';
            replyPreviewText.innerHTML = '';
        }
        
        function addMessage(data, isSystem = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.setAttribute('data-message-id', data.id);
            
            if (isSystem) {
                messageDiv.className = 'message system';
                messageDiv.innerHTML = `<div class="message-bubble">${data}</div>`;
            } else {
                const isCurrentUser = data.username === currentUser;
                const bubbleStyle = isCurrentUser ? 'background: #667eea; color: white; margin-left: auto;' : 'background: white;';
                
                let replyHtml = '';
                if (data.replyTo) {
                    const repliedMsg = messagesMap.get(data.replyTo.id);
                    if (repliedMsg) {
                        replyHtml = `
                            <div class="reply-preview">
                                <span>${repliedMsg.username}:</span>
                                <div class="reply-text">${formatReplyText(repliedMsg)}</div>
                            </div>
                        `;
                    }
                }
                
                let content = '';
                
                if (data.type === 'text') {
                    content = `
                        ${replyHtml}
                        <div class="message-text">${escapeHtml(data.message)}</div>
                        <div class="message-time">${data.time}</div>
                    `;
                } else if (data.type === 'voice') {
                    content = `
                        ${replyHtml}
                        <div class="voice-message" onclick="event.stopPropagation(); playVoice('${data.audio}')">
                            🔊 Голосовое сообщение (${Math.round(data.duration)} сек)
                        </div>
                        <div class="message-time">${data.time}</div>
                    `;
                } else if (data.type === 'image') {
                    content = `
                        ${replyHtml}
                        <img class="message-image" src="${data.image}" onclick="event.stopPropagation(); showImage('${data.image}')" alt="Изображение">
                        ${data.caption ? `<div class="image-caption">${escapeHtml(data.caption)}</div>` : ''}
                        <div class="message-time">${data.time}</div>
                    `;
                }
                
                messageDiv.innerHTML = `
                    <div class="message-bubble" style="${bubbleStyle}">
                        ${!isCurrentUser ? `<div class="message-username">${escapeHtml(data.username)}</div>` : ''}
                        ${content}
                    </div>
                `;
                
                // Контекстное меню при правом клике
                messageDiv.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    showContextMenu(e.clientX, e.clientY, data);
                });
                
                // Левый клик для ответа (можно настроить)
                messageDiv.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'IMG' && e.target.tagName !== 'BUTTON' && !e.target.classList?.contains('voice-message')) {
                        showReplyBar(data);
                    }
                });
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function showContextMenu(x, y, message) {
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            
            const replyOption = document.createElement('div');
            replyOption.innerHTML = '💬 Ответить';
            replyOption.onclick = () => {
                showReplyBar(message);
                menu.remove();
            };
            
            const copyOption = document.createElement('div');
            copyOption.innerHTML = '📋 Скопировать текст';
            copyOption.onclick = () => {
                if (message.type === 'text') {
                    navigator.clipboard.writeText(message.message);
                }
                menu.remove();
            };
            
            menu.appendChild(replyOption);
            if (message.type === 'text') {
                menu.appendChild(copyOption);
            }
            
            document.body.appendChild(menu);
            
            setTimeout(() => {
                document.addEventListener('click', () => menu.remove(), { once: true });
            }, 100);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function playVoice(audioData) {
            const audio = new Audio(audioData);
            audio.play();
        }
        
        function showImage(src) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<img src="${src}">`;
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        function updateUsersList(users) {
            usersList.innerHTML = '';
            onlineCountSpan.textContent = `${users.length} человек`;
            
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                userDiv.innerHTML = `<div class="user-name">${escapeHtml(user)} ${user === currentUser ? '(Вы)' : ''}</div>`;
                usersList.appendChild(userDiv);
            });
        }
        
        // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ==========
        
        async function startRecording() {
            if (isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const duration = audioChunks.reduce((acc, chunk) => acc + chunk.size, 0) / 16000;
                        const voiceData = {
                            username: currentUser,
                            audio: reader.result,
                            duration: duration
                        };
                        if (replyToMessage) {
                            voiceData.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                            cancelReply();
                        }
                        socket.emit('voice message', voiceData);
                    };
                    
                    stream.getTracks().forEach(track => track.stop());
                    isRecording = false;
                    recordingHint.style.display = 'none';
                    voiceBtn.classList.remove('recording');
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingHint.style.display = 'flex';
                voiceBtn.classList.add('recording');
                
            } catch (err) {
                console.error('Ошибка микрофона:', err);
                alert('Не удалось получить доступ к микрофону');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }
        
        // ========== ФОТО ==========
        
        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            // Проверка размера фото (макс 10MB)
            const maxSize = 10 * 1024 * 1024; // 10MB
            if (file.size > maxSize) {
                alert('Файл слишком большой! Максимальный размер 10MB');
                input.value = '';
                return;
            }
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const caption = prompt('Подпись к фото (необязательно):', '');
                const imageData = {
                    username: currentUser,
                    image: reader.result,
                    caption: caption || ''
                };
                if (replyToMessage) {
                    imageData.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                    cancelReply();
                }
                socket.emit('image message', imageData);
                input.value = '';
            };
        }
        
        // ========== СОБЫТИЯ ==========
        
        socket.on('chat history', (messages) => {
            messagesArea.innerHTML = '';
            messagesMap.clear();
            messages.forEach(msg => {
                messagesMap.set(msg.id, msg);
                addMessage(msg);
            });
        });
        
        socket.on('chat message', (data) => {
            messagesMap.set(data.id, data);
            addMessage(data);
        });
        
        socket.on('user joined', (data) => {
            addMessage(`${escapeHtml(data.username)} присоединился`, true);
        });
        
        socket.on('user left', (data) => {
            addMessage(`${escapeHtml(data.username)} покинул чат`, true);
        });
        
        socket.on('users list', (users) => {
            updateUsersList(users);
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            const messageData = {
                username: currentUser,
                message: message
            };
            if (replyToMessage) {
                messageData.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                cancelReply();
            }
            
            socket.emit('chat message', messageData);
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    </script>
</body>
</html>
