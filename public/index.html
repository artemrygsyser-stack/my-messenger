<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер - Голосовые сообщения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid #34495e;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .online-count {
            font-size: 12px;
            color: #2ecc71;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .user-name::before {
            content: "●";
            color: #2ecc71;
            font-size: 10px;
        }
        
        .voice-btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.1s;
            font-weight: bold;
        }
        
        .voice-btn:active {
            background: #c0392b;
            transform: scale(0.95);
        }
        
        .voice-btn.recording {
            background: #27ae60;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.system {
            align-items: center;
        }
        
        .message.system .message-bubble {
            background: #e9ecef;
            color: #6c757d;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message-username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #495057;
        }
        
        .message-text {
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: #6c757d;
            margin-top: 4px;
        }
        
        .voice-message {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .voice-message:hover {
            background: #5a67d8;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        #send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        #send-btn:hover {
            background: #5a67d8;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .recording-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 14px;
            animation: pulse 0.5s infinite;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay" style="display: flex;">
        <div class="login-box">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="login-name" placeholder="Введите ваше имя" maxlength="20">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>
    
    <div class="chat-container" style="display: none;" id="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Онлайн</h3>
                <div class="online-count" id="online-count">0 человек</div>
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <h2>💬 Общий чат</h2>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="input-area">
                <textarea id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>
    
    <div id="recording-hint" class="recording-hint" style="display: none;">
        🎙️ Запись... Отпустите кнопку для отправки
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let currentRecordingTarget = null;
        
        // DOM элементы
        const loginOverlay = document.getElementById('login-overlay');
        const chatContainer = document.getElementById('chat-container');
        const messagesArea = document.getElementById('messages-area');
        const usersList = document.getElementById('users-list');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const onlineCountSpan = document.getElementById('online-count');
        const recordingHint = document.getElementById('recording-hint');
        
        // Проверяем сохранённое имя
        const savedName = localStorage.getItem('messenger_username');
        if (savedName) {
            document.getElementById('login-name').value = savedName;
        }
        
        function joinChat() {
            const name = document.getElementById('login-name').value.trim();
            if (!name) {
                alert('Пожалуйста, введите имя');
                return;
            }
            
            currentUser = name;
            localStorage.setItem('messenger_username', currentUser);
            
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            socket.emit('user join', currentUser);
        }
        
        function addMessage(data, isSystem = false, isVoice = false, voiceUrl = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            if (isSystem) {
                messageDiv.className = 'message system';
                messageDiv.innerHTML = `<div class="message-bubble">${data}</div>`;
            } else if (isVoice) {
                const isCurrentUser = data.username === currentUser;
                messageDiv.innerHTML = `
                    <div class="message-bubble" style="${isCurrentUser ? 'background: #667eea; color: white; margin-left: auto;' : 'background: white;'}">
                        ${!isCurrentUser ? `<div class="message-username">${data.username}</div>` : ''}
                        <div class="voice-message" onclick="playAudio('${voiceUrl}')">
                            🔊 Голосовое сообщение (${Math.round(data.duration)} сек)
                        </div>
                        <div class="message-time">${data.time}</div>
                    </div>
                `;
            } else {
                const isCurrentUser = data.username === currentUser;
                messageDiv.innerHTML = `
                    <div class="message-bubble" style="${isCurrentUser ? 'background: #667eea; color: white; margin-left: auto;' : 'background: white;'}">
                        ${!isCurrentUser ? `<div class="message-username">${data.username}</div>` : ''}
                        <div class="message-text">${escapeHtml(data.message)}</div>
                        <div class="message-time">${data.time}</div>
                    </div>
                `;
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function playAudio(url) {
            const audio = new Audio(url);
            audio.play();
        }
        
        function updateUsersList(users) {
            usersList.innerHTML = '';
            onlineCountSpan.textContent = `${users.length} человек`;
            
            users.forEach(user => {
                if (user !== currentUser) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div class="user-name">${user}</div>
                        <button class="voice-btn" 
                            onmousedown="startRecording('${user}')" 
                            onmouseup="stopRecording()"
                            onmouseleave="stopRecording()"
                            ontouchstart="startRecording('${user}')"
                            ontouchend="stopRecording()">
                            🎤 Говорить
                        </button>
                    `;
                    usersList.appendChild(userDiv);
                } else {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `<div class="user-name">${user} (Вы)</div>`;
                    usersList.appendChild(userDiv);
                }
            });
        }
        
        // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ (РАЦИЯ) ==========
        
        async function startRecording(targetUser) {
            if (currentRecordingTarget) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentRecordingTarget = targetUser;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        const duration = audioChunks.reduce((acc, chunk) => acc + chunk.size, 0) / 16000;
                        
                        // Отправляем голосовое сообщение
                        socket.emit('voice message', {
                            to: targetUser,
                            from: currentUser,
                            audio: base64Audio,
                            duration: duration
                        });
                        
                        addMessage({
                            username: currentUser,
                            message: 'Голосовое сообщение отправлено',
                            time: new Date().toLocaleTimeString()
                        });
                    };
                    
                    // Останавливаем все треки микрофона
                    stream.getTracks().forEach(track => track.stop());
                    currentRecordingTarget = null;
                    recordingHint.style.display = 'none';
                };
                
                mediaRecorder.start();
                recordingHint.style.display = 'flex';
                
            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                alert('Не удалось получить доступ к микрофону');
                currentRecordingTarget = null;
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }
        
        // Получение голосового сообщения
        socket.on('voice message', (data) => {
            if (data.from !== currentUser) {
                // Создаём аудио URL из base64
                const audioUrl = data.audio;
                addMessage({
                    username: data.from,
                    message: 'Голосовое сообщение',
                    time: new Date().toLocaleTimeString(),
                    duration: data.duration
                }, false, true, audioUrl);
                
                // Воспроизводим автоматически (опционально)
                // playAudio(audioUrl);
            }
        });
        
        // ========== ЧАТ ==========
        
        socket.on('chat history', (messages) => {
            messagesArea.innerHTML = '';
            messages.forEach(msg => {
                if (msg.message && msg.message.startsWith('data:audio')) {
                    addMessage({
                        username: msg.username,
                        time: msg.time,
                        duration: 3
                    }, false, true, msg.message);
                } else {
                    addMessage(msg);
                }
            });
        });
        
        socket.on('chat message', (data) => {
            if (data.username !== currentUser) {
                addMessage(data);
            }
        });
        
        socket.on('user joined', (data) => {
            addMessage(`${data.username} присоединился к чату`, true);
        });
        
        socket.on('user left', (data) => {
            addMessage(`${data.username} покинул чат`, true);
        });
        
        socket.on('users list', (users) => {
            updateUsersList(users);
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            socket.emit('chat message', {
                username: currentUser,
                message: message
            });
            
            addMessage({
                username: currentUser,
                message: message,
                time: new Date().toLocaleTimeString()
            });
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    </script>
</body>
</html>
