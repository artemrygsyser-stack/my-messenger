<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер - Telegram стиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
        }
        
        /* Telegram-style container */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            background: #0a0a0f;
        }
        
        /* Sidebar - как в Telegram */
        .sidebar-telegram {
            width: 320px;
            background: #0f0f14;
            border-right: 1px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            background: #0f0f14;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-details h3 {
            color: white;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .user-status {
            font-size: 12px;
            color: #2ecc71;
        }
        
        .theme-toggle-telegram {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: #888;
        }
        
        /* Search */
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: #1a1a2e;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: #666;
        }
        
        /* Chats list */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .chat-item:hover {
            background: #1a1a2e;
        }
        
        .chat-item.active {
            background: #1f1f2e;
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .chat-avatar.general {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .chat-avatar.private {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            color: white;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .chat-preview {
            color: #888;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
        }
        
        .chat-badge {
            background: #e74c3c;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        /* Main chat area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d0d14;
        }
        
        .chat-header-telegram {
            padding: 16px 20px;
            background: #0f0f14;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-mobile {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            color: white;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .chat-header-status {
            color: #888;
            font-size: 12px;
        }
        
        /* Messages area */
        .messages-area-telegram {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* Message styles - как в Telegram */
        .message-row {
            display: flex;
            width: 100%;
        }
        
        .message-row.own {
            justify-content: flex-end;
        }
        
        .message-row.other {
            justify-content: flex-start;
        }
        
        .message-bubble-telegram {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
        }
        
        .message-row.own .message-bubble-telegram {
            background: #4a3f8a;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-row.other .message-bubble-telegram {
            background: #1a1a2e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #667eea;
        }
        
        .message-text-telegram {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 10px;
        }
        
        .message-row.own .message-meta {
            color: rgba(255,255,255,0.7);
        }
        
        .message-row.other .message-meta {
            color: #666;
        }
        
        .reply-preview-telegram {
            background: rgba(0,0,0,0.1);
            padding: 6px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 11px;
            border-left: 3px solid #667eea;
        }
        
        .edit-icon-telegram {
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 6px;
            font-size: 11px;
        }
        
        .message-bubble-telegram:hover .edit-icon-telegram {
            opacity: 0.6;
        }
        
        .voice-message-telegram {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(102,126,234,0.2);
        }
        
        .message-image-telegram {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
        }
        
        .system-message-telegram {
            text-align: center;
            margin: 10px 0;
        }
        
        .system-message-telegram span {
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #666;
        }
        
        /* Input area - как в Telegram */
        .input-area-telegram {
            padding: 12px 16px;
            background: #0f0f14;
            border-top: 1px solid #1a1a2e;
        }
        
        .reply-bar-telegram {
            background: #1a1a2e;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        
        .reply-bar-telegram span {
            color: #667eea;
            font-weight: bold;
        }
        
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }
        
        .attach-btn {
            background: #1a1a2e;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .message-input-telegram {
            flex: 1;
            background: #1a1a2e;
            border: none;
            border-radius: 25px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            min-height: 44px;
        }
        
        .message-input-telegram::placeholder {
            color: #666;
        }
        
        .send-btn-telegram {
            background: #4a3f8a;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .voice-btn-telegram {
            background: #e74c3c;
        }
        
        .voice-btn-telegram.recording {
            background: #27ae60;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Login */
        .login-overlay-telegram {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box-telegram {
            background: #0f0f14;
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            width: 350px;
        }
        
        .login-box-telegram h2 {
            color: white;
            margin-bottom: 20px;
        }
        
        .login-box-telegram input {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            background: #1a1a2e;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
        }
        
        .login-box-telegram button {
            width: 100%;
            padding: 14px;
            background: #4a3f8a;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .recording-hint-telegram {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 14px;
            animation: pulse 0.5s infinite;
        }
        
        .modal-telegram {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        
        .modal-telegram img {
            max-width: 90%;
            max-height: 90%;
        }
        
        .context-menu-telegram {
            position: fixed;
            background: #1a1a2e;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 4000;
            overflow: hidden;
            min-width: 180px;
        }
        
        .context-menu-telegram div {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            color: white;
        }
        
        .context-menu-telegram div:hover {
            background: #2a2a3e;
        }
        
        @media (max-width: 768px) {
            .sidebar-telegram {
                position: fixed;
                left: -320px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s;
            }
            
            .sidebar-telegram.open {
                left: 0;
            }
            
            .back-mobile {
                display: block;
            }
            
            .message-bubble-telegram {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-overlay" class="login-overlay-telegram" style="display: none;">
        <div class="login-box-telegram">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="login-name" placeholder="Введите ваше имя" maxlength="20">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>
    
    <div class="app-container">
        <!-- Sidebar как в Telegram -->
        <div class="sidebar-telegram" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-details">
                        <h3 id="user-name-display">Загрузка...</h3>
                        <div class="user-status">онлайн</div>
                    </div>
                    <button class="theme-toggle-telegram" onclick="toggleTheme()">☀️</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск" id="search-input">
            </div>
            <div class="chats-list" id="chats-list"></div>
        </div>
        
        <!-- Main chat area -->
        <div class="main-chat">
            <div class="chat-header-telegram">
                <button class="back-mobile" onclick="toggleMobileSidebar()">☰</button>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chat-header-name">Общий чат</div>
                    <div class="chat-header-status" id="chat-header-status"></div>
                </div>
            </div>
            
            <div class="messages-area-telegram" id="messages-area"></div>
            
            <div class="input-area-telegram">
                <div id="reply-bar-telegram" class="reply-bar-telegram" style="display: none;">
                    <div><span>Ответ</span> <span id="reply-preview-text"></span></div>
                    <button style="background:none; border:none; color:#888; cursor:pointer;" onclick="cancelReply()">✕</button>
                </div>
                <div class="input-wrapper">
                    <button class="attach-btn" onclick="document.getElementById('image-input').click()">📎</button>
                    <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;" onchange="sendImage(this)">
                    <textarea id="message-input" class="message-input-telegram" placeholder="Сообщение..." rows="1"></textarea>
                    <button id="voice-btn" class="attach-btn voice-btn-telegram" onmousedown="startRecording()" onmouseup="stopRecording()" onmouseleave="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">🎤</button>
                    <button id="send-btn" class="send-btn-telegram">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="recording-hint" class="recording-hint-telegram" style="display: none;">
        🎙️ Запись... Отпустите кнопку для отправки
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let replyToMessage = null;
        let messagesMap = new Map();
        let currentChat = 'general';
        let currentPrivateWith = null;
        let allUsers = [];
        let chats = []; // Список чатов для отображения
        let privateChatsData = new Map(); // Сохранённые ЛС
        
        // DOM элементы
        const loginOverlay = document.getElementById('login-overlay');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const recordingHint = document.getElementById('recording-hint');
        const voiceBtn = document.getElementById('voice-btn');
        const replyBar = document.getElementById('reply-bar-telegram');
        const replyPreviewText = document.getElementById('reply-preview-text');
        const chatsList = document.getElementById('chats-list');
        const chatHeaderName = document.getElementById('chat-header-name');
        const chatHeaderStatus = document.getElementById('chat-header-status');
        const userNameDisplay = document.getElementById('user-name-display');
        const userAvatar = document.getElementById('user-avatar');
        const searchInput = document.getElementById('search-input');
        
        // Авто-вход
        const savedName = localStorage.getItem('messenger_username');
        if (savedName) {
            currentUser = savedName;
            loginOverlay.style.display = 'none';
            userNameDisplay.textContent = currentUser;
            userAvatar.textContent = currentUser.charAt(0).toUpperCase();
            socket.emit('user join', currentUser);
        } else {
            loginOverlay.style.display = 'flex';
        }
        
        function joinChat() {
            const name = document.getElementById('login-name').value.trim();
            if (!name) {
                alert('Введите имя');
                return;
            }
            currentUser = name;
            localStorage.setItem('messenger_username', currentUser);
            userNameDisplay.textContent = currentUser;
            userAvatar.textContent = currentUser.charAt(0).toUpperCase();
            loginOverlay.style.display = 'none';
            socket.emit('user join', currentUser);
        }
        
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }
        
        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        // Обновление списка чатов
        function updateChatsList() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredChats = chats.filter(chat => 
                chat.name.toLowerCase().includes(searchTerm)
            );
            
            chatsList.innerHTML = '';
            filteredChats.forEach(chat => {
                const chatDiv = document.createElement('div');
                chatDiv.className = `chat-item ${chat.id === currentChat && chat.type === currentChat ? 'active' : ''}`;
                chatDiv.onclick = () => {
                    if (chat.type === 'general') {
                        switchToGeneral();
                    } else {
                        switchToPrivate(chat.id);
                    }
                    if (window.innerWidth <= 768) {
                        toggleMobileSidebar();
                    }
                };
                
                chatDiv.innerHTML = `
                    <div class="chat-avatar ${chat.type === 'general' ? 'general' : 'private'}">
                        ${chat.type === 'general' ? '💬' : '👤'}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chat.name)}</div>
                        <div class="chat-preview">${escapeHtml(chat.preview || 'Нет сообщений')}</div>
                    </div>
                    <div class="chat-time">${chat.time || ''}</div>
                    ${chat.unread ? '<div class="chat-badge">1</div>' : ''}
                `;
                chatsList.appendChild(chatDiv);
            });
        }
        
        function switchToGeneral() {
            currentChat = 'general';
            currentPrivateWith = null;
            chatHeaderName.textContent = 'Общий чат';
            chatHeaderStatus.textContent = `${allUsers.length} участников`;
            messagesArea.innerHTML = '';
            messagesMap.clear();
            // Загружаем историю
            socket.emit('get general history');
            updateChatsList();
        }
        
        function switchToPrivate(username) {
            currentChat = 'private';
            currentPrivateWith = username;
            chatHeaderName.textContent = username;
            chatHeaderStatus.textContent = 'личный чат';
            messagesArea.innerHTML = '';
            messagesMap.clear();
            socket.emit('get private messages', username);
            updateChatsList();
        }
        
        function addChat(chatId, chatName, type, preview = '') {
            if (!chats.find(c => c.id === chatId && c.type === type)) {
                chats.push({
                    id: chatId,
                    name: chatName,
                    type: type,
                    preview: preview,
                    time: new Date().toLocaleTimeString().slice(0,5)
                });
                updateChatsList();
            }
        }
        
        function addMessageToChat(chatId, chatType, messagePreview) {
            const chat = chats.find(c => c.id === chatId && c.type === chatType);
            if (chat) {
                chat.preview = messagePreview;
                chat.time = new Date().toLocaleTimeString().slice(0,5);
                if (currentChat !== chatType || currentPrivateWith !== chatId) {
                    chat.unread = true;
                }
                updateChatsList();
            }
        }
        
        function formatReplyText(message) {
            if (message.type === 'text') {
                return message.message.length > 40 ? message.message.substring(0, 40) + '...' : message.message;
            } else if (message.type === 'voice') {
                return '🎤 Голосовое сообщение';
            } else if (message.type === 'image') {
                return '📷 Фото';
            }
            return 'Сообщение';
        }
        
        function showReplyBar(message) {
            replyToMessage = message;
            replyPreviewText.innerHTML = `${message.username || message.from}: ${formatReplyText(message)}`;
            replyBar.style.display = 'flex';
            messageInput.focus();
        }
        
        function cancelReply() {
            replyToMessage = null;
            replyBar.style.display = 'none';
        }
        
        function editMessage(messageId, currentText, isPrivate = false, targetUser = null) {
            const newText = prompt('Редактировать сообщение:', currentText);
            if (newText && newText.trim() && newText !== currentText) {
                if (isPrivate && targetUser) {
                    socket.emit('edit private message', { messageId, newMessage: newText.trim(), targetUser });
                } else {
                    socket.emit('edit message', { messageId, newMessage: newText.trim() });
                }
            }
        }
        
        function addMessageToUI(data, isSystem = false, isPrivate = false) {
            if (data.deleted && data.type === 'text') return;
            
            if (isSystem) {
                const div = document.createElement('div');
                div.className = 'system-message-telegram';
                div.innerHTML = `<span>${escapeHtml(data)}</span>`;
                messagesArea.appendChild(div);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                return;
            }
            
            const isOwn = isPrivate ? data.from === currentUser : data.username === currentUser;
            const row = document.createElement('div');
            row.className = `message-row ${isOwn ? 'own' : 'other'}`;
            row.setAttribute('data-message-id', data.id);
            
            let replyHtml = '';
            if (data.replyTo) {
                const repliedMsg = messagesMap.get(data.replyTo.id);
                if (repliedMsg && !repliedMsg.deleted) {
                    replyHtml = `
                        <div class="reply-preview-telegram">
                            <span>${escapeHtml(repliedMsg.username || repliedMsg.from)}:</span>
                            ${escapeHtml(formatReplyText(repliedMsg))}
                        </div>
                    `;
                }
            }
            
            let editedHtml = data.edited ? `<span class="edited-mark">(ред.)</span>` : '';
            let editIcon = '';
            if (isOwn && data.type === 'text' && !data.deleted) {
                editIcon = `<span class="edit-icon-telegram" onclick="event.stopPropagation(); editMessage(${data.id}, '${escapeHtml(data.message).replace(/'/g, "\\'")}', ${isPrivate}, '${isPrivate ? (data.to === currentUser ? data.from : data.to) : ''}')">✏️</span>`;
            }
            
            let content = '';
            const displayName = isPrivate ? (data.from === currentUser ? 'Вы' : data.from) : data.username;
            
            if (data.type === 'text') {
                content = `
                    ${replyHtml}
                    <div class="message-text-telegram">${escapeHtml(data.message)}${editedHtml}${editIcon}</div>
                    <div class="message-meta">${data.time}</div>
                `;
            } else if (data.type === 'voice') {
                content = `
                    ${replyHtml}
                    <div class="voice-message-telegram" onclick="event.stopPropagation(); playVoice('${data.audio}')">
                        🔊 Голосовое (${Math.round(data.duration)} сек)
                    </div>
                    <div class="message-meta">${data.time}</div>
                `;
            } else if (data.type === 'image') {
                content = `
                    ${replyHtml}
                    <img class="message-image-telegram" src="${data.image}" onclick="event.stopPropagation(); showImage('${data.image}')">
                    ${data.caption ? `<div class="image-caption">${escapeHtml(data.caption)}</div>` : ''}
                    <div class="message-meta">${data.time}</div>
                `;
            }
            
            row.innerHTML = `
                <div class="message-bubble-telegram">
                    <div class="message-sender">${escapeHtml(displayName)}</div>
                    ${content}
                </div>
            `;
            
            if (isOwn && data.type === 'text') {
                row.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showContextMenu(e.clientX, e.clientY, data, isPrivate);
                });
            }
            
            row.addEventListener('click', (e) => {
                if (!e.target.classList?.contains('edit-icon-telegram') && e.target.tagName !== 'IMG') {
                    showReplyBar(data);
                }
            });
            
            messagesArea.appendChild(row);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function showContextMenu(x, y, message, isPrivate) {
            const menu = document.createElement('div');
            menu.className = 'context-menu-telegram';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            
            const options = ['💬 Ответить', '✏️ Редактировать', '🗑️ Удалить', '📋 Копировать'];
            const actions = [
                () => showReplyBar(message),
                () => {
                    if (isPrivate) {
                        const targetUser = message.to === currentUser ? message.from : message.to;
                        editMessage(message.id, message.message, true, targetUser);
                    } else {
                        editMessage(message.id, message.message, false);
                    }
                    menu.remove();
                },
                () => {
                    if (confirm('Удалить сообщение?')) {
                        if (isPrivate) {
                            const targetUser = message.to === currentUser ? message.from : message.to;
                            socket.emit('delete private message', { messageId: message.id, targetUser });
                        } else {
                            socket.emit('delete message', { messageId: message.id });
                        }
                    }
                    menu.remove();
                },
                () => {
                    navigator.clipboard.writeText(message.message);
                    menu.remove();
                }
            ];
            
            options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.textContent = opt;
                div.onclick = actions[i];
                menu.appendChild(div);
            });
            
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 100);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function playVoice(audioData) {
            new Audio(audioData).play();
        }
        
        function showImage(src) {
            const modal = document.createElement('div');
            modal.className = 'modal-telegram';
            modal.innerHTML = `<img src="${src}">`;
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }
        
        async function startRecording() {
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const duration = audioChunks.reduce((a,c) => a + c.size, 0) / 16000;
                        if (currentChat === 'general') {
                            const data = { username: currentUser, audio: reader.result, duration };
                            if (replyToMessage) {
                                data.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                                cancelReply();
                            }
                            socket.emit('voice message', data);
                        } else if (currentPrivateWith) {
                            socket.emit('private voice message', { from: currentUser, to: currentPrivateWith, audio: reader.result, duration });
                        }
                    };
                    stream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    recordingHint.style.display = 'none';
                    voiceBtn.classList.remove('recording');
                };
                mediaRecorder.start();
                isRecording = true;
                recordingHint.style.display = 'flex';
                voiceBtn.classList.add('recording');
            } catch(e) {
                alert('Нет доступа к микрофону');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
        }
        
        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10*1024*1024) {
                alert('Файл > 10MB');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const caption = prompt('Подпись к фото:', '');
                if (currentChat === 'general') {
                    const data = { username: currentUser, image: reader.result, caption: caption || '' };
                    if (replyToMessage) {
                        data.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                        cancelReply();
                    }
                    socket.emit('image message', data);
                } else if (currentPrivateWith) {
                    socket.emit('private image message', { from: currentUser, to: currentPrivateWith, image: reader.result, caption: caption || '' });
                }
                input.value = '';
            };
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (currentChat === 'general') {
                const data = { username: currentUser, message: text };
                if (replyToMessage) {
                    data.replyTo = { id: replyToMessage.id, username: replyToMessage.username };
                    cancelReply();
                }
                socket.emit('chat message', data);
            } else if (currentPrivateWith) {
                socket.emit('private message', { from: currentUser, to: currentPrivateWith, message: text });
            }
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }
        
        // Socket events
        socket.on('chat history', (messages) => {
            if (currentChat === 'general') {
                messagesArea.innerHTML = '';
                messagesMap.clear();
                messages.forEach(m => { messagesMap.set(m.id, m); addMessageToUI(m); });
            }
        });
        
        socket.on('private history', (messages) => {
            if (currentChat === 'private' && currentPrivateWith) {
                messagesArea.innerHTML = '';
                messagesMap.clear();
                messages.forEach(m => { messagesMap.set(m.id, m); addMessageToUI(m, false, true); });
            }
        });
        
        socket.on('chat message', (data) => {
            if (currentChat === 'general') {
                messagesMap.set(data.id, data);
                addMessageToUI(data);
            }
            addChat('general', 'Общий чат', 'general', data.message);
            addMessageToChat('general', 'general', data.message);
        });
        
        socket.on('private message', (data) => {
            if (currentChat === 'private' && currentPrivateWith && (data.from === currentPrivateWith || data.to === currentPrivateWith)) {
                messagesMap.set(data.id, data);
                addMessageToUI(data, false, true);
            }
            addChat(data.from, data.from, 'private', data.message);
            addMessageToChat(data.from, 'private', data.message);
        });
        
        socket.on('private message sent', (data) => {
            if (currentChat === 'private' && currentPrivateWith === data.to) {
                messagesMap.set(data.id, data);
                addMessageToUI(data, false, true);
            }
            addChat(data.to, data.to, 'private', data.message);
            addMessageToChat(data.to, 'private', data.message);
        });
        
        socket.on('user joined', (data) => {
            if (currentChat === 'general') {
                addMessageToUI(`${escapeHtml(data.username)} присоединился`, true);
            }
        });
        
        socket.on('user left', (data) => {
            if (currentChat === 'general') {
                addMessageToUI(`${escapeHtml(data.username)} вышел`, true);
            }
        });
        
        socket.on('users list', (users) => {
            allUsers = users;
            if (currentChat === 'general') {
                chatHeaderStatus.textContent = `${users.length} участников`;
            }
        });
        
        socket.on('get general history', () => {
            // Запрос истории при переключении
        });
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        searchInput.addEventListener('input', () => updateChatsList());
        
        // Добавляем общий чат в список
        addChat('general', 'Общий чат', 'general', 'Добро пожаловать!');
        
        window.joinChat = joinChat;
        window.toggleTheme = toggleTheme;
        window.toggleMobileSidebar = toggleMobileSidebar;
        window.startRecording = startRecording;
        window.stopRecording = stopRecording;
        window.sendImage = sendImage;
        window.cancelReply = cancelReply;
        window.editMessage = editMessage;
        window.playVoice = playVoice;
        window.showImage = showImage;
    </script>
</body>
</html>
